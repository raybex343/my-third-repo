<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple to-do list app to manage your daily tasks" />
    <title>My To-Do App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    <h1>My To-Do List</h1>
    <input type="text" id="taskInput" placeholder="Type a task here..." />

    <p id="taskCount">Total Tasks: 0</p>
    <ul id="task-list"></ul>
    <button id="clearAll">Clear All Tasks</button>
    <link rel="stylesheet" href="style.css">
    <footer> made by your name </footer>
    <script src="app.js"></script>
    </body>
</html>
